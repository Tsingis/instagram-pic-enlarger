name: test
on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/jest/**"
      - "tsconfig.json"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/test.yml"
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install --immutable
      - name: Check formatting, linting and typecheck
        run: |
          yarn format
          yarn lint
          yarn typecheck
      - name: Run tests
        run: yarn test
